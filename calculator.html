<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .calculator {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            overflow: hidden;
        }
        
        .display {
            background: #1a1a1a;
            color: white;
            padding: 30px 20px;
            text-align: right;
        }
        
        .history {
            font-size: 14px;
            color: #aaa;
            min-height: 20px;
            margin-bottom: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .current {
            font-size: 36px;
            font-weight: 300;
            word-break: break-all;
            min-height: 45px;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: #ddd;
        }
        
        button {
            border: none;
            padding: 20px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        
        button:hover {
            background: #f5f5f5;
        }
        
        button:active {
            background: #e0e0e0;
            transform: scale(0.98);
        }
        
        .number {
            font-weight: 500;
        }
        
        .operator {
            background: #f0f0f0;
            color: #ff6b6b;
            font-weight: 500;
        }
        
        .equals {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 500;
        }
        
        .special {
            background: #ff6b6b;
            color: white;
            font-weight: 500;
        }
        
        .scientific {
            background: #e8f4fd;
            color: #2196f3;
            font-weight: 500;
        }
        
        .zero {
            grid-column: span 2;
        }
        
        .footer {
            text-align: center;
            padding: 15px;
            color: #666;
            font-size: 12px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="history" id="history"></div>
            <div class="current" id="current">0</div>
        </div>
        
        <div class="buttons">
            <!-- 第一行 -->
            <button class="special" onclick="clearAll()">C</button>
            <button class="special" onclick="clearEntry()">CE</button>
            <button class="special" onclick="backspace()">⌫</button>
            <button class="operator" onclick="setOperation('÷')">÷</button>
            
            <!-- 第二行 -->
            <button class="number" onclick="appendNumber('7')">7</button>
            <button class="number" onclick="appendNumber('8')">8</button>
            <button class="number" onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="setOperation('×')">×</button>
            
            <!-- 第三行 -->
            <button class="number" onclick="appendNumber('4')">4</button>
            <button class="number" onclick="appendNumber('5')">5</button>
            <button class="number" onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="setOperation('-')">-</button>
            
            <!-- 第四行 -->
            <button class="number" onclick="appendNumber('1')">1</button>
            <button class="number" onclick="appendNumber('2')">2</button>
            <button class="number" onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="setOperation('+')">+</button>
            
            <!-- 第五行 -->
            <button class="number zero" onclick="appendNumber('0')">0</button>
            <button class="number" onclick="appendNumber('.')">.</button>
            <button class="special" onclick="toggleSign()">±</button>
            <button class="equals" onclick="calculate()">=</button>
            
            <!-- 第六行 - 科学计算 -->
            <button class="scientific" onclick="scientificFunction('sin')">sin</button>
            <button class="scientific" onclick="scientificFunction('cos')">cos</button>
            <button class="scientific" onclick="scientificFunction('tan')">tan</button>
            <button class="scientific" onclick="scientificFunction('√')">√</button>
            
            <!-- 第七行 -->
            <button class="scientific" onclick="insertConstant('π')">π</button>
            <button class="scientific" onclick="insertConstant('e')">e</button>
            <button class="scientific" onclick="scientificFunction('x²')">x²</button>
            <button class="scientific" onclick="scientificFunction('x³')">x³</button>
            
            <!-- 第八行 -->
            <button class="scientific" onclick="scientificFunction('log')">log</button>
            <button class="scientific" onclick="scientificFunction('ln')">ln</button>
            <button class="scientific" onclick="appendNumber('(')">(</button>
            <button class="scientific" onclick="appendNumber(')')">)</button>
        </div>
        
        <div class="footer">
            高级计算器 v1.0 | 支持基本运算和科学计算
        </div>
    </div>

    <script>
        let currentInput = "";
        let previousInput = "";
        let operation = null;
        let resultDisplayed = false;
        
        const currentDisplay = document.getElementById('current');
        const historyDisplay = document.getElementById('history');
        
        function updateDisplay() {
            currentDisplay.textContent = currentInput || "0";
        }
        
        function updateHistory() {
            if (previousInput && operation) {
                historyDisplay.textContent = `${previousInput} ${getOperationSymbol(operation)}`;
            } else {
                historyDisplay.textContent = "";
            }
        }
        
        function getOperationSymbol(op) {
            const symbols = {
                '÷': '÷',
                '×': '×',
                '-': '-',
                '+': '+'
            };
            return symbols[op] || op;
        }
        
        function clearAll() {
            currentInput = "";
            previousInput = "";
            operation = null;
            resultDisplayed = false;
            updateDisplay();
            updateHistory();
        }
        
        function clearEntry() {
            currentInput = "";
            updateDisplay();
        }
        
        function backspace() {
            if (currentInput) {
                currentInput = currentInput.slice(0, -1);
                updateDisplay();
            }
        }
        
        function appendNumber(num) {
            if (resultDisplayed) {
                currentInput = "";
                resultDisplayed = false;
            }
            
            // 防止多个小数点
            if (num === '.' && currentInput.includes('.')) {
                return;
            }
            
            currentInput += num;
            updateDisplay();
        }
        
        function setOperation(op) {
            if (!currentInput) return;
            
            if (operation && previousInput) {
                calculate();
            }
            
            previousInput = currentInput;
            currentInput = "";
            operation = op;
            resultDisplayed = false;
            updateDisplay();
            updateHistory();
        }
        
        function toggleSign() {
            if (!currentInput) return;
            
            if (currentInput.startsWith('-')) {
                currentInput = currentInput.slice(1);
            } else {
                currentInput = '-' + currentInput;
            }
            updateDisplay();
        }
        
        function scientificFunction(func) {
            if (!currentInput) return;
            
            try {
                let value = parseFloat(currentInput);
                let result;
                
                switch(func) {
                    case 'sin':
                        result = Math.sin(value * Math.PI / 180);
                        break;
                    case 'cos':
                        result = Math.cos(value * Math.PI / 180);
                        break;
                    case 'tan':
                        result = Math.tan(value * Math.PI / 180);
                        break;
                    case '√':
                        if (value < 0) throw new Error("不能对负数开平方根");
                        result = Math.sqrt(value);
                        break;
                    case 'x²':
                        result = Math.pow(value, 2);
                        break;
                    case 'x³':
                        result = Math.pow(value, 3);
                        break;
                    case 'log':
                        if (value <= 0) throw new Error("对数函数的参数必须大于0");
                        result = Math.log10(value);
                        break;
                    case 'ln':
                        if (value <= 0) throw new Error("自然对数的参数必须大于0");
                        result = Math.log(value);
                        break;
                    default:
                        return;
                }
                
                // 处理浮点数精度
                result = parseFloat(result.toFixed(10));
                
                historyDisplay.textContent = `${func}(${value}) = ${result}`;
                currentInput = result.toString();
                updateDisplay();
                resultDisplayed = true;
                
            } catch (error) {
                alert(error.message);
                clearEntry();
            }
        }
        
        function insertConstant(constant) {
            let value;
            switch(constant) {
                case 'π':
                    value = Math.PI.toString();
                    break;
                case 'e':
                    value = Math.E.toString();
                    break;
                default:
                    return;
            }
            
            if (resultDisplayed) {
                currentInput = "";
                resultDisplayed = false;
            }
            
            currentInput = value;
            updateDisplay();
        }
        
        function calculate() {
            if (!operation || !previousInput || !currentInput) return;
            
            try {
                let num1 = parseFloat(previousInput);
                let num2 = parseFloat(currentInput);
                let result;
                
                switch(operation) {
                    case '÷':
                        if (num2 === 0) throw new Error("不能除以零");
                        result = num1 / num2;
                        break;
                    case '×':
                        result = num1 * num2;
                        break;
                    case '-':
                        result = num1 - num2;
                        break;
                    case '+':
                        result = num1 + num2;
                        break;
                    default:
                        return;
                }
                
                // 处理浮点数精度
                result = parseFloat(result.toFixed(10));
                
                historyDisplay.textContent = `${previousInput} ${getOperationSymbol(operation)} ${currentInput} = ${result}`;
                currentInput = result.toString();
                previousInput = "";
                operation = null;
                updateDisplay();
                resultDisplayed = true;
                
            } catch (error) {
                alert(error.message);
                clearAll();
            }
        }
        
        // 键盘支持
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            
            if (key >= '0' && key <= '9') {
                appendNumber(key);
            } else if (key === '.') {
                appendNumber('.');
            } else if (key === '+') {
                setOperation('+');
            } else if (key === '-') {
                setOperation('-');
            } else if (key === '*') {
                setOperation('×');
            } else if (key === '/') {
                e.preventDefault();
                setOperation('÷');
            } else if (key === 'Enter' || key === '=') {
                calculate();
            } else if (key === 'Escape') {
                clearAll();
            } else if (key === 'Backspace') {
                backspace();
            }
        });
        
        // 初始化显示
        updateDisplay();
    </script>
</body>
</html>
